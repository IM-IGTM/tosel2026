<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="testJs.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="testWord.css" />
    <title>TOSEL VOCA Test</title>
  </head>
  <body>
    <div class="page" id="page">
      <div class="test-panel-wrapper">
        <div class="test-header">
          <div class="timer">
            <span class="timer-icon">🕒</span>
            <span id="timer-sec">2.3</span> sec
          </div>
          <div class="part-badge">Part A</div>
          <div class="category-title">Vocabulary by Meaning</div>
        </div>

        <div class="quiz-container">
          <div class="instruction-bar">
            알맞은 단어를 고르세요.
            <span class="info-icon">?</span>
          </div>

          <div class="question-word" id="questionLabel">학사</div>

          <div class="card-footer-deco">
            <span>🔍</span>
            <div class="dots">
              <span class="dot"></span><span class="dot active"></span
              ><span class="dot"></span>
            </div>
            <span>➕</span>
          </div>
        </div>

        <div class="submit-hint">
          답안을 선택한 후 Space 또는 Enter 키를 눌러 제출하세요.
        </div>

        <div class="choice-list-wrapper">
          <button class="one choice-row-btn">
            <span class="badge">A</span> <span class="opt-text">master</span>
          </button>
          <button class="two choice-row-btn">
            <span class="badge">B</span> <span class="opt-text">scholar</span>
          </button>
          <button class="three choice-row-btn selected">
            <span class="badge">C</span> <span class="opt-text">bachelor</span>
            <span class="check-icon">✓</span>
          </button>
          <button class="four choice-row-btn">
            <span class="badge">D</span> <span class="opt-text">diploma</span>
          </button>
        </div>
      </div>

      <div class="examOver" style="display: none">
        <p>수고하셨습니다. 시험이 종료되었습니다.</p>
        <button class="resultOk" id="resultOk" onClick="resultOk()">
          결과보기
        </button>
      </div>

      <div class="answer-panel" style="display: none">
        <h3>시험 결과</h3>
        <div class="result-summary">
          <p>이름: <span id="result-name"></span></p>
          <p>
            점수: <span id="result-correct">0</span> /
            <span id="result-total">0</span>
          </p>
          <p class="summary-notice">
            * 빨간색으로 표시된 칸은 틀린 문제입니다.
          </p>
        </div>
        <hr />
        <table class="answer-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </body>
</html>
